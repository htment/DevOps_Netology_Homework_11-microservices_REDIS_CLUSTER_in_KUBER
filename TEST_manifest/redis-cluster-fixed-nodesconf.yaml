apiVersion: redis.redis.opstreelabs.in/v1beta2
kind: RedisCluster
metadata:
  name: redis-cluster-fixed
spec:
  clusterSize: 3
  clusterVersion: v7

  persistenceEnabled: true

  kubernetesConfig:
    image: quay.io/opstree/redis:v7.0.12
    imagePullPolicy: IfNotPresent
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"

  storage:
    volumeClaimTemplate:
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: local-path
        resources:
          requests:
            storage: 5Gi

  redisConfig:
    # Оператор ожидает, что файл nodes.conf лежит по пути cluster-config-file.
    # Для исправления делаем cluster-config-file внутри /data, на который монтируется PVC.
    dynamicConfig:
      - "cluster-enabled yes"
      - "cluster-config-file /data/nodes.conf"
      - "cluster-node-timeout 5000"
      - "cluster-require-full-coverage no"
      - "appendonly yes"
      - "protected-mode no"
      - "bind 0.0.0.0"

  redisExporter:
    enabled: true
    image: quay.io/opstree/redis-exporter:v1.44.0

