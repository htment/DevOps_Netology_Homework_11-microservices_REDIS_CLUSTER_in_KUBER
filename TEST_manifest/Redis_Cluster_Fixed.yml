apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-cluster-config
data:
  redis.conf: |
    cluster-enabled yes
    cluster-node-timeout 5000
    cluster-require-full-coverage no
    appendonly yes
    bind 0.0.0.0
---
apiVersion: redis.redis.opstreelabs.in/v1beta2
kind: RedisCluster
metadata:
  name: redis-cluster
spec:
  clusterSize: 6  # Общее количество шардов (3 шард + 3 реплики)
  clusterVersion: v7
  kubernetesConfig:
    image: redis:7.2-alpine
    imagePullPolicy: IfNotPresent
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
    configMapRef:  # Новый раздел для ссылки на ConfigMap
      name: redis-cluster-config
  persistenceEnabled: true
  storage:
    volumeClaimTemplate:
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: local-path
        resources:
          requests:
            storage: 10Gi
